<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Generator</title>

<style>

body{
font-family: system-ui;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:14px;
}

h1{
font-size:22px;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
font-size:16px;
}

select,input{
width:100%;
margin-top:8px;
margin-bottom:16px;
}

.slider{
width:100%;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#6366f1;
border:none;
border-radius:10px;
color:white;
}

audio{
margin-top:20px;
width:100%;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Voice Generator</h1>

<textarea id="text" placeholder="Type your script..."></textarea>

<label>Voice</label>
<select id="voice">
<option value="adam">Adam</option>
<option value="bella">Bella</option>
<option value="antoni">Antoni</option>
</select>

<label>Stability</label>
<input type="range" min="0" max="1" step="0.1" value="0.5" id="stability" class="slider">

<label>Clarity / Similarity</label>
<input type="range" min="0" max="1" step="0.1" value="0.8" id="similarity" class="slider">

<label>Style</label>
<input type="range" min="0" max="1" step="0.1" value="0.3" id="style" class="slider">

<label>Speed</label>
<input type="range" min="0.7" max="1.2" step="0.1" value="1" id="speed" class="slider">

<button onclick="generateVoice()">Generate Voice</button>

<audio id="audio" controls></audio>

</div>

<script src="script.js"></script>

</body>
  </html>
