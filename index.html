<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Voice Generator</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:15px;
background:#6366f1;
border:none;
border-radius:8px;
color:white;
font-size:18px;
margin-top:10px;
}

audio{
width:100%;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>AI Voice Generator</h2>

<textarea id="text" placeholder="Type text"></textarea>

<button onclick="generate()">Generate Voice</button>

<audio id="audio" controls></audio>

</div>

<script>

async function generate(){

const text=document.getElementById("text").value

const response=await fetch("https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL",{

method:"POST",

headers:{
"xi-api-key":"sk_502d0de909318e28059e54d15c6b8f9be3e9b4b3e82c9435",
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text,
model_id:"eleven_monolingual_v1"
})

})

const blob=await response.blob()

const url=URL.createObjectURL(blob)

document.getElementById("audio").src=url

}

</script>

</body>
</html>
